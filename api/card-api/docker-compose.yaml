services:
  api:
    build: .
    container_name: card-api-dev
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: >
      uvicorn index:app
      --host 0.0.0.0
      --port 8000
      --reload